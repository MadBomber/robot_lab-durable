AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 4.0
  Exclude:
    - 'examples/**/*'
    - 'vendor/**/*'

# ── Style: disabled cops ───────────────────────────────────────────────────
# User prefers double-quoted strings; both forms are acceptable
Style/StringLiterals:
  Enabled: false

Style/StringLiteralsInInterpolation:
  Enabled: false

# YARD handles API docs — inline class/module comments add noise in gems
Style/Documentation:
  Enabled: false

# Ruby 4.0 freezes string literals by default — the magic comment is redundant
Style/FrozenStringLiteralComment:
  Enabled: false

# User prefers explicit if/unless blocks over trailing modifier form
Style/IfUnlessModifier:
  Enabled: false

# User prefers explicit begin/rescue blocks over inline rescue modifier
Style/RescueModifier:
  Enabled: false

# User prefers explicit def methods over attr_reader/attr_writer shortcuts
Style/TrivialAccessors:
  Enabled: false

# User prefers ternary operators
Style/MultilineTernaryOperator:
  Enabled: false

# User prefers nil checks over the safe navigation operator
Style/SafeNavigation:
  Enabled: false

# Class.new and class keyword are both acceptable
Style/EmptyClassDefinition:
  Enabled: false

# Compact module/class style (Foo::Bar) is acceptable
Style/ClassAndModuleChildren:
  Enabled: false

# Bare rescue => e is acceptable
Style/RescueStandardError:
  Enabled: false

# ── Layout: disabled cops ──────────────────────────────────────────────────
# 120 chars fits modern screens without sacrificing readability
Layout/LineLength:
  Max: 120

# Extra whitespace for column alignment is an intentional style choice
Layout/ExtraSpacing:
  Enabled: false

# Aligned hash keys are an intentional style choice
Layout/HashAlignment:
  Enabled: false

Layout/FirstHashElementIndentation:
  Enabled: false

# Guard clause empty-line enforcement conflicts with compact style
Layout/EmptyLineAfterGuardClause:
  Enabled: false

# ── Naming ─────────────────────────────────────────────────────────────────
# Short single-char params are acceptable in test helpers
Naming/MethodParameterName:
  Exclude:
    - 'test/**/*'

# Test method names describing decimal values (e.g. by_0_1) are intentional
Naming/VariableNumber:
  Exclude:
    - 'test/**/*'

# Both e and err are acceptable rescue variable names
Naming/RescuedExceptionsVariableName:
  Enabled: false

# ── Gemspec ────────────────────────────────────────────────────────────────
# Development dependencies belong in the Gemfile, not the gemspec
Gemspec/DevelopmentDependencies:
  EnforcedStyle: Gemfile

# TargetRubyVersion reflects the running Ruby (4.0); gemspecs keep >= 3.2 for context
Gemspec/RequiredRubyVersion:
  Enabled: false

# Gemspec dependency order is intentional (core first, then alpha)
Gemspec/OrderedDependencies:
  Enabled: false

# ── Metrics: these are the cops that matter ────────────────────────────────
Metrics/MethodLength:
  Max: 25
  CountAsOne:
    - heredoc
    - array
    - hash

Metrics/AbcSize:
  Max: 25

Metrics/ClassLength:
  Max: 150
  Exclude:
    - 'test/**/*'

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 11

# Rake tasks, gemspecs, and test blocks naturally exceed the default length limit
Metrics/BlockLength:
  Exclude:
    - 'Rakefile'
    - '*.gemspec'
    - 'test/**/*'
